<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera QC Otomatis</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 8px; background: #000; }
        button { margin-top: 20px; padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 400px; font-weight: bold;}
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status-teks { font-weight: bold; margin-bottom: 15px; color: #333; }
    </style>
</head>
<body>

    <h2>Audit QC Harian</h2>
    <p id="status-teks">Mencari lokasi GPS...</p>

    <video id="kamera" autoplay playsinline></video>
    
    <button id="btn-jepret" disabled>Mohon Tunggu...</button>

    <canvas id="kanvas" style="display:none;"></canvas>

    <script>
        const kamera = document.getElementById('kamera');
        const kanvas = document.getElementById('kanvas');
        const btnJepret = document.getElementById('btn-jepret');
        const statusTeks = document.getElementById('status-teks');

        let dataLokasi = { lat: null, lon: null };
        let dataShift = "Tidak Diketahui";

        // Fungsi untuk membuat timestamp dengan zona waktu Asia/Jakarta (+07:00)
        function getWaktuJakarta() {
            const sekarang = new Date();
            const jakartaTime = new Date(sekarang.getTime() + (7 * 60 * 60 * 1000));
            return jakartaTime.toISOString().replace('Z', '+07:00');
        }

        // Fungsi Menentukan Shift berdasarkan Jam HP
        function tentukanShift() {
            const jamSekarang = new Date().getHours();
            if (jamSekarang >= 6 && jamSekarang < 15) {
                return "Pagi";
            } else if (jamSekarang >= 15 && jamSekarang < 23) {
                return "Siang/Malam";
            } else {
                return "Closing/Lembur";
            }
        }

        // Minta Akses Lokasi GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (posisi) => {
                    dataLokasi.lat = posisi.coords.latitude;
                    dataLokasi.lon = posisi.coords.longitude;
                    dataShift = tentukanShift();
                    
                    statusTeks.innerText = `GPS Terkunci | Shift: ${dataShift}`;
                    statusTeks.style.color = "green";
                    
                    nyalakanKamera();
                },
                (error) => {
                    statusTeks.innerText = "Akses GPS Ditolak! Harap izinkan lokasi.";
                    statusTeks.style.color = "red";
                    alert("Sistem membutuhkan akses lokasi untuk verifikasi cabang.");
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusTeks.innerText = "Browser tidak mendukung GPS.";
        }

        // Fungsi Menyalakan Kamera
        function nyalakanKamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    kamera.srcObject = stream;
                    btnJepret.innerText = "Jepret & Kirim";
                    btnJepret.disabled = false;
                })
                .catch(err => {
                    alert("Akses kamera ditolak.");
                });
        }

        // Proses Jepret dan Kirim
        btnJepret.addEventListener('click', () => {
            btnJepret.innerText = "Mengirim...";
            btnJepret.disabled = true;

            kanvas.width = kamera.videoWidth;
            kanvas.height = kamera.videoHeight;
            kanvas.getContext('2d').drawImage(kamera, 0, 0);

            const fotoBase64 = kanvas.toDataURL('image/jpeg', 0.8);

            // URL Webhook n8n
            const n8nWebhookUrl = 'https://pete-chromatophoric-laverne.ngrok-free.dev/webhook-test/qc-kopi'; 

            // Kirim data ke n8n
            fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // Bypass blokir ngrok
                },
                body: JSON.stringify({
                    foto: fotoBase64,
                    latitude: dataLokasi.lat,
                    longitude: dataLokasi.lon,
                    shift: dataShift,
                    waktu_upload: getWaktuJakarta() // Menggunakan Waktu Jakarta
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("Foto QC berhasil dikirim!");
                } else {
                    alert("Data terkirim, tapi n8n memberikan respon error.");
                }
                btnJepret.innerText = "Jepret & Kirim";
                btnJepret.disabled = false;
            })
            .catch(error => {
                alert("Gagal mengirim. Cek koneksi internet atau status n8n.");
                btnJepret.innerText = "Jepret & Kirim";
                btnJepret.disabled = false;
            });
        });
    </script>
</body>
</html>
