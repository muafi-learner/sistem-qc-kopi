<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera QC Otomatis</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        
        /* Wadah untuk Video dan Preview agar ukurannya sama */
        .kamera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        video, img#preview-foto {
            width: 100%;
            display: block;
        }

        /* Sembunyikan elemen secara default */
        .hidden { display: none !important; }

        /* Styling Tombol */
        .btn-group {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:disabled { background: #ccc !important; cursor: not-allowed; }

        /* Warna Tombol */
        #btn-jepret { background: #007bff; color: white; } /* Biru untuk Ambil Foto */
        #btn-kirim { background: #28a745; color: white; }  /* Hijau untuk Konfirmasi */
        #btn-ulang { background: #dc3545; color: white; }  /* Merah untuk Batal */

        #status-teks { font-weight: bold; margin-bottom: 15px; color: #333; }
        
        /* Overlay Loading */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; font-weight: bold; font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" class="hidden">Mohon Tunggu, Mengirim...</div>

    <h2>Audit QC Harian</h2>
    <p id="status-teks">Mencari lokasi GPS...</p>

    <div class="kamera-container">
        <video id="kamera" autoplay playsinline></video>
        
        <img id="preview-foto" class="hidden" alt="Pratinjau Foto">
    </div>
    
    <div class="btn-group">
        <button id="btn-jepret" disabled>Mohon Tunggu...</button>

        <button id="btn-kirim" class="hidden">✅ Foto Jelas, Kirim</button>
        <button id="btn-ulang" class="hidden">🔄 Foto Buram, Ulangi</button>
    </div>

    <canvas id="kanvas" style="display:none;"></canvas>

    <script>
        // Referensi elemen HTML
        const kamera = document.getElementById('kamera');
        const previewFoto = document.getElementById('preview-foto');
        const kanvas = document.getElementById('kanvas');
        
        const btnJepret = document.getElementById('btn-jepret');
        const btnKirim = document.getElementById('btn-kirim');
        const btnUlang = document.getElementById('btn-ulang');
        
        const statusTeks = document.getElementById('status-teks');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Variabel Data
        let dataLokasi = { lat: null, lon: null };
        let dataShift = "Tidak Diketahui";
        let fotoTerjepretBase64 = null; // Menyimpan data foto sementara

        // --- 1. Fungsi Utilitas (Waktu & Shift) ---
        
        function getWaktuJakarta() {
            const sekarang = new Date();
            const jakartaTime = new Date(sekarang.getTime() + (7 * 60 * 60 * 1000));
            return jakartaTime.toISOString().replace('Z', '+07:00');
        }

        function tentukanShift() {
            const jamSekarang = new Date().getHours();
            if (jamSekarang >= 6 && jamSekarang < 15) return "Pagi";
            if (jamSekarang >= 15 && jamSekarang < 23) return "Siang/Malam";
            return "Closing/Lembur";
        }

        // --- 2. Inisialisasi GPS & Kamera ---

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (posisi) => {
                    dataLokasi.lat = posisi.coords.latitude;
                    dataLokasi.lon = posisi.coords.longitude;
                    dataShift = tentukanShift();
                    statusTeks.innerText = `GPS Terkunci | Shift: ${dataShift}`;
                    statusTeks.style.color = "green";
                    nyalakanKamera();
                },
                (error) => {
                    statusTeks.innerText = "Akses GPS Ditolak! Harap izinkan lokasi.";
                    statusTeks.style.color = "red";
                    alert("Sistem membutuhkan akses lokasi untuk verifikasi cabang.");
                },
                { enableHighAccuracy: true }
            );
        } else {
            statusTeks.innerText = "Browser tidak mendukung GPS.";
        }

        function nyalakanKamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(stream => {
                    kamera.srcObject = stream;
                    btnJepret.innerText = "📸 Ambil Foto QC";
                    btnJepret.disabled = false;
                })
                .catch(err => {
                    alert("Akses kamera ditolak.");
                });
        }

        // --- 3. Logika Alur Review Gambar ---

        // Aksi 1: Tombol Jepret ditekan
        btnJepret.addEventListener('click', () => {
            // Tangkap frame video ke kanvas
            kanvas.width = kamera.videoWidth;
            kanvas.height = kamera.videoHeight;
            kanvas.getContext('2d').drawImage(kamera, 0, 0);

            // Ubah menjadi data Base64
            fotoTerjepretBase64 = kanvas.toDataURL('image/jpeg', 0.8);

            // Tampilkan foto di elemen Preview
            previewFoto.src = fotoTerjepretBase64;

            // Alihkan Tampilan: Sembunyikan Kamera Langsung, Tampilkan Preview
            kamera.classList.add('hidden');
            previewFoto.classList.remove('hidden');

            // Alihkan Tombol: Sembunyikan tombol Jepret, Tampilkan tombol Review
            btnJepret.classList.add('hidden');
            btnKirim.classList.remove('hidden');
            btnUlang.classList.remove('hidden');
            
            statusTeks.innerText = "Review Foto: Apakah sudah jelas?";
            statusTeks.style.color = "#856404"; // Warna peringatan (kuning tua)
        });

        // Aksi 2: Tombol Ulangi ditekan (User menolak foto)
        btnUlang.addEventListener('click', () => {
            // Reset data foto sementara
            fotoTerjepretBase64 = null;

            // Alihkan Tampilan: Tampilkan kembali Kamera Langsung, Sembunyikan Preview
            kamera.classList.remove('hidden');
            previewFoto.classList.add('hidden');

            // Alihkan Tombol: Tampilkan kembali tombol Jepret, Sembunyikan tombol Review
            btnJepret.classList.remove('hidden');
            btnKirim.classList.add('hidden');
            btnUlang.classList.add('hidden');

            statusTeks.innerText = `GPS Terkunci | Shift: ${dataShift}`;
            statusTeks.style.color = "green";
        });

        // Aksi 3: Tombol Kirim ditekan (User menyetujui foto)
        btnKirim.addEventListener('click', () => {
            if (!fotoTerjepretBase64) return;

            // Tampilkan Overlay Loading
            loadingOverlay.classList.remove('hidden');
            btnKirim.disabled = true;
            btnUlang.disabled = true;

            // URL Webhook n8n
            const n8nWebhookUrl = 'https://pete-chromatophoric-laverne.ngrok-free.dev/webhook-test/qc-kopi'; 

            // Kirim data ke n8n
            fetch(n8nWebhookUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' 
                },
                body: JSON.stringify({
                    foto: fotoTerjepretBase64, // Data foto yang disetujui
                    latitude: dataLokasi.lat,
                    longitude: dataLokasi.lon,
                    shift: dataShift,
                    waktu_upload: getWaktuJakarta()
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("✅ Foto QC berhasil dikirim!");
                    // Setelah sukses, otomatis reset tampilan untuk foto berikutnya
                    btnUlang.click(); 
                } else {
                    alert("❌ Gagal mengirim. n8n error.");
                }
            })
            .catch(error => {
                alert("❌ Gagal mengirim. Cek koneksi internet.");
            })
            .finally(() => {
                // Sembunyikan Overlay Loading
                loadingOverlay.classList.add('hidden');
                btnKirim.disabled = false;
                btnUlang.disabled = false;
            });
        });
    </script>
</body>
</html>
